set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/state/tmux/plugins'

unbind C-b

set-option -g prefix C-Space

bind-key C-Space send-prefix

set-option -s escape-time 0
set-option -g display-time 2000
set-option -g default-terminal "screen-256color"
set-option -g status-keys vi
set-option -g allow-rename off

# List of plugins
set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'folke/tokyonight.nvim'

# Initialize TMUX plugin manager
run '~/.local/state/tmux/plugins/tpm/tpm'

# Load additional config
source-file -F '#{d:current_file}/colorschemes/tokyonight_night.tmux'
